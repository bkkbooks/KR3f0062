body:
  text: 穹天論穹天論天形穹窿如雞子幕其際周接四海之表浮於元氣之上譬如覆奩以抑水而不沒者氣充其中故也日繞辰極沒西而還東不出八地中天之有極猶蓋之有斗也天北下於地三十度極之傾在地卯酉之北亦三十度人在卯酉之南十餘萬里故斗極之不為地中當對天地卯酉之位耳日行黃道繞極之北去黃道百一十五度南去黃道六十七度二至之所舍以為長短也晉書天文志附録天文録古人言天地之形者有三一曰渾天一曰蓋天三曰宣夜宣夜之說未嘗聞也後有虞昺作穹天論姚信作昕天論虞喜作安天論衆形殊象參差其間蓋天之說又有三體一云天如車蓋遊乎八極之中一云天形如笠中央高而四邊下亦云天如欹車蓋南高北下晉書天文志虞喜族祖河間相聳又立穹天論云云
